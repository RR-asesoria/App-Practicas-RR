<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>
    <link rel="stylesheet" href="../css/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body.dark-mode .editarCliente-page { background: #2a2a2a !important; }
        body.dark-mode .form-card { background: #2a2a2a !important; border-color: #444 !important; }
        body.dark-mode .app__title { color: #e0e0e0 !important; }
        body.dark-mode .back-button { color: #e0e0e0 !important; }
        body.dark-mode .cliente-form label { color: #e0e0e0 !important; }
        body.dark-mode .cliente-form input,
        body.dark-mode .cliente-form select {
            background: #3a3a3a !important;
            color: #e0e0e0 !important;
            border-color: #555 !important;
        }
    </style>
</head>
<body class="editarCliente-page">
<main class="agregarClienteApp">
    <header class="app__header">
        <a href="campaniaActual.html" class="back-button">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="app__title">
            <i class="fa-solid fa-user-pen"></i>
            Editar Cliente
        </h1>
    </header>
    <section class="form-card">
        <form class="cliente-form">

            <label>Nombre</label>
            <input id="nombre" type="text">

            <label>NIF/CIF</label>
            <input id="nifCif" type="text">

            <label>Teléfono</label>
            <input id="telefono" type="text">

            <label>Correo Electrónico</label>
            <input id="correoElectronico" type="email">

            <label>Fecha Nacimiento</label>
            <input id="fechaNacimiento" type="date">

            <label>Referencia</label>
            <input id="referencia" type="text">

            <label>Casilla 505 Anterior</label>
            <input id="casilla505anterior" type="text" maxlength="5">

            <label>Números CC (últimos 5 IBAN)</label>
            <input id="numerosCC" type="text" maxlength="5">

            <label>Datos Fiscales Descargados</label>
            <select id="datosFiscalesDescargados">
                <option value="false">No</option>
                <option value="true">Sí</option>
            </select>

            <label>Importe</label>
            <input id="importe" type="text">

            <label>Tipo Cliente</label>
            <select id="tipoCliente">
                <option value="">Selecciona una opción</option>
                <option value="AUTONOMO">Autónomo</option>
                <option value="PARTICULARES">Particulares</option>
                <option value="NORESIDENTE">No Residente</option>
            </select>

            <label>Casilla 505 Actual</label>
            <input id="casilla505Actual" type="text" maxlength="5">

            <label>Excel Datos Elaboración</label>
            <select id="excelDatosElaboracion">
                <option value="false">No</option>
                <option value="true">Sí</option>
            </select>

            <label>Estado Cliente</label>
            <select id="estadoCliente">
                <option value="CONTACTADONO">No Contactado</option>
                <option value="CONTACTADOSISEHACENO">Contactado - Se Hace No</option>
                <option value="CONTACTADOSISEHACESI">Contactado - Se Hace Sí</option>
                <option value="CONTACTADOSISEHACEPENDIENTE">Contactado - Pendiente</option>
            </select>

            <label>Tipo Facturado</label>
            <select id="tipoFacturado">
                <option value="FACTURADONO">No Facturado</option>
                <option value="FACTIRADOSIENVIADANO">Facturado - Enviada No</option>
                <option value="FACTURADOSIENVIADASI">Facturado - Enviada Sí</option>
            </select>

            <label>Recogida Datos</label>
            <select id="recogidaDatos">
                <option value="FACTURARELLENANO">No Rellenada</option>
                <option value="FACTURARELLENASIENVIADANO">Rellenada - Enviada No</option>
                <option value="FACTURARELLENASIENVIADASIFIRMADANO">Rellenada - Enviada Sí - Firmada No</option>
                <option value="FACTURARELLENASIENVIADASIFIRMADASI">Rellenada - Enviada Sí - Firmada Sí</option>
            </select>

            <label>Cobrado</label>
            <select id="cobrado">
                <option value="NO">No</option>
                <option value="SI">Sí</option>
            </select>

            <label>Borrador</label>
            <select id="borrador">
                <option value="BORRADORCREADONO">No Creado</option>
                <option value="BORRADORCREADOSIENVIADONO">Creado - Enviado No</option>
                <option value="BORRADORCREADOSIENVIADOSI">Creado - Enviado Sí</option>
            </select>

            <label>Presentada</label>
            <select id="presentada">
                <option value="CONFIRMADOPRESENTARNO">No Presentada</option>
                <option value="CONFIRMADOPRESENTARSIPRESENTADANO">Confirmada - Presentada No</option>
                <option value="CONFIRMADOPRESENTARSIPRESENTADASIENVIADANO">Confirmada - Presentada Sí - Enviada No</option>
                <option value="CONFIRMADOPRESENTARSIPRESENTADASIENVIADASI">Confirmada - Presentada Sí - Enviada Sí</option>
            </select>

            <button type="submit" class="cliente-actualizar">
                <i class="fa-solid fa-pen-to-square"></i>
                Actualizar Cliente
            </button>

        </form>
    </section>
</main>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="../js/Script.js"></script>
</body>
</html>
