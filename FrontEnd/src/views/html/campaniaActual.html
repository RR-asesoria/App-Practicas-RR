<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="consultarTablas-page">
<div class="campaniaActual consultasActuales-tamanio">
    <div class="consultasActuales-header">
        <a href="menuClientes.html" class="back-button-tablas">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <i class="fa-solid fa-circle-user"></i>
        <h2>Buscador de Clientes</h2>
    </div>

    <!-- Filtros básicos -->
    <div class="consultasActuales-menu-horizontal">
        <div class="consultasActuales-item">
            <label>Nombre</label>
            <input type="text" class="consultasActuales-input" id="filtroNombre" placeholder="Nombre">
        </div>
        <div class="consultasActuales-item">
            <label>DNI / NIE</label>
            <input type="text" class="consultasActuales-input" id="filtroDni" placeholder="DNI / NIE">
        </div>
        <button class="consultasActuales-aceptar">BUSCAR</button>
        <button type="button" id="btnFiltrosAvanzadosClientes" class="consultas-avanzados">Filtros avanzados ▼</button>
    </div>

    <!-- Filtros avanzados -->
    <div id="panelFiltrosAvanzadosClientes" style="display:none" class="consultasActuales-menu-horizontal">
        <div class="consultasActuales-item">
            <label>Tipo Cliente</label>
            <select class="consultasActuales-input" id="filtroTipoCliente">
                <option value="">Cualquiera</option>
                <option value="AUTONOMO">Autónomo</option>
                <option value="PARTICULARES">Particulares</option>
                <option value="NORESIDENTE">No Residente</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Estado Cliente</label>
            <select class="consultasActuales-input" id="filtroEstadoCliente">
                <option value="">Cualquiera</option>
                <option value="CONTACTADONO">No Contactado</option>
                <option value="CONTACTADOSISEHACENO">Contactado - No se hace</option>
                <option value="CONTACTADOSISEHACESI">Contactado - Se hace</option>
                <option value="CONTACTADOSISEHACEPENDIENTE">Contactado - Pendiente</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Tipo Facturado</label>
            <select class="consultasActuales-input" id="filtroTipoFacturado">
                <option value="">Cualquiera</option>
                <option value="FACTURADONO">No Facturado</option>
                <option value="FACTIRADOSIENVIADANO">Facturado - Enviada No</option>
                <option value="FACTURADOSIENVIADASI">Facturado - Enviada Sí</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Recogida Datos</label>
            <select class="consultasActuales-input" id="filtroRecogidaDatos">
                <option value="">Cualquiera</option>
                <option value="FACTURARELLENANO">No Rellenada</option>
                <option value="FACTURARELLENASIENVIADANO">Rellenada - Enviada No</option>
                <option value="FACTURARELLENASIENVIADASIFIRMADANO">Rellenada - Enviada Sí - Firmada No</option>
                <option value="FACTURARELLENASIENVIADASIFIRMADASI">Rellenada - Enviada Sí - Firmada Sí</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Borrador</label>
            <select class="consultasActuales-input" id="filtroBorrador">
                <option value="">Cualquiera</option>
                <option value="BORRADORCREADONO">No Creado</option>
                <option value="BORRADORCREADOSIENVIADONO">Creado - Enviado No</option>
                <option value="BORRADORCREADOSIENVIADOSI">Creado - Enviado Sí</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Presentada</label>
            <select class="consultasActuales-input" id="filtroPresentada">
                <option value="">Cualquiera</option>
                <option value="CONFIRMADOPRESENTARNO">No Presentada</option>
                <option value="CONFIRMADOPRESENTARSIPRESENTADANO">Confirmado - No Presentada</option>
                <option value="CONFIRMADOPRESENTARSIPRESENTADASIENVIADANO">Presentada - Enviada No</option>
                <option value="CONFIRMADOPRESENTARSIPRESENTADASIENVIADASI">Presentada - Enviada Sí</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Cobrado</label>
            <select class="consultasActuales-input" id="filtroCobrado">
                <option value="">Cualquiera</option>
                <option value="NO">No</option>
                <option value="SI">Sí</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Datos Fiscales</label>
            <select class="consultasActuales-input" id="filtroDatosFiscales">
                <option value="">Cualquiera</option>
                <option value="true">Descargados</option>
                <option value="false">No Descargados</option>
            </select>
        </div>
        <div class="consultasActuales-item">
            <label>Excel Elaboración</label>
            <select class="consultasActuales-input" id="filtroExcelElaboracion">
                <option value="">Cualquiera</option>
                <option value="true">Sí</option>
                <option value="false">No</option>
            </select>
        </div>
    </div>

    <div class="consultasActuales-tabla-container">
        <table class="consultasActuales-tabla">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>NIF/CIF</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Fecha Nacimiento</th>
                <th>Tipo Cliente</th>
                <th>Estado</th>
                <th>Importe</th>
                <th>Cobrado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="tablaClientes">
            </tbody>
        </table>
    </div>
</div>
<!-- 1º Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<!-- 2º Tu script -->
<script src="../js/Script.js"></script>
</body>
</html>
