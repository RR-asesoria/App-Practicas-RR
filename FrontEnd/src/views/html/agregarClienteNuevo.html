<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Agregar un cliente nuevo</title>

  <link rel="stylesheet" href="../css/Style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="agregarCliente-page">

<main class="agregarClienteApp">

  <header class="app__header">

    <a href="menu.html" class="back-button">
      <i class="fa-solid fa-arrow-left"></i>
    </a>

    <h1 class="app__title">
      <i class="fa-solid fa-user-plus"></i>
      Agregar Cliente Nuevo
    </h1>

  </header>

  <section class="form-card">

    <form class="cliente-form">

      <label>nombre</label>
      <input id="nombre" type="text">

      <label>nifCif</label>
      <input id="nifCif" type="text">

      <label>fechaNacimiento</label>
      <input id="fechaNacimiento" type="date">

      <label>referencia</label>
      <input id="referencia" type="text">

      <label>casilla505anterior</label>
      <input id="casilla505anterior" type="text">

      <label>numerosCC</label>
      <input id="numerosCC" type="text">

      <label>datosFiscalesDescargados</label>
      <input id="datosFiscalesDescargados" type="text">

      <label>importe</label>
      <input id="importe" type="number">

      <label>facturado</label>
      <select id="facturado">
        <option value="">Selecciona una opción</option>
        <option value="SI">SI</option>
        <option value="NO">NO</option>
      </select>

      <label>recogidaDatos</label>
      <input id="recogidaDatos" type="text">

      <label>excelDatosElaboracion</label>
      <input id="excelDatosElaboracion" type="text">

      <label>borrador</label>
      <input id="borrador" type="text">

      <label>presentada</label>
      <input id="presentada" type="text">

      <label>cobrado</label>
      <select id="cobrado">
        <option value="">Selecciona una opción</option>
        <option value="SI">SI</option>
        <option value="NO">NO</option>
      </select>

      <label>tipoCliente</label>
      <input id="tipoCliente" type="text">

      <label>estadoCliente</label>
      <input id="estadoCliente" type="text">

      <label>casilla505Actual</label>
      <input id="casilla505Actual" type="text">

      <button type="submit" class="cliente-guardar">
        <i class="fa-solid fa-floppy-disk"></i>
        Guardar Cliente
      </button>

    </form>

  </section>

</main>

<script src="../js/Script.js"></script>

</body>
</html>
