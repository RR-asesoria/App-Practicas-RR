<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar un cliente nuevo</title>
  <link rel="stylesheet" href="../css/Style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body.dark-mode .agregarClienteApp { background: #2a2a2a !important; }
    body.dark-mode .form-card { background: #2a2a2a !important; }
    body.dark-mode input,
    body.dark-mode select {
      background: #3a3a3a !important;
      color: #e0e0e0 !important;
      border: 1px solid #555 !important;
    }
    body.dark-mode label { color: #e0e0e0 !important; }
  </style>



</head>
<body class="agregarCliente-page">
<main class="agregarClienteApp">
  <header class="app__header">
    <a href="menu.html" class="back-button">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1 class="app__title">
      <i class="fa-solid fa-user-plus"></i>
      Agregar Cliente Nuevo
    </h1>
  </header>
  <section class="form-card">
    <form class="cliente-form">

      <label>Nombre</label>
      <input id="nombre" type="text">

      <label>NIF/CIF</label>
      <input id="nifCif" type="text">

      <label>Teléfono</label>
      <input id="telefono" type="text">

      <label>Correo Electrónico</label>
      <input id="correoElectronico" type="email">

      <label>Fecha Nacimiento</label>
      <input id="fechaNacimiento" type="date">

      <label>Referencia</label>
      <input id="referencia" type="text">

      <label>Casilla 505 Anterior</label>
      <input id="casilla505anterior" type="text">

      <label>Números CC (últimos 5 IBAN)</label>
      <input id="numerosCC" type="text">

      <label>Datos Fiscales Descargados</label>
      <select id="datosFiscalesDescargados">
        <option value="false">No</option>
        <option value="true">Sí</option>
      </select>

      <label>Importe</label>
      <input id="importe" type="text">

      <label>Tipo Facturado</label>
      <select id="tipoFacturado">
        <option value="FACTURADONO">No Facturado</option>
        <option value="FACTURADOSI">Facturado</option>
      </select>

      <label>Recogida Datos</label>
      <select id="recogidaDatos">
        <option value="FACTURARELLENANO">No Rellenada</option>
        <option value="FACTURARELLENASI">Rellenada</option>
      </select>

      <label>Excel Datos Elaboración</label>
      <select id="excelDatosElaboracion">
        <option value="false">No</option>
        <option value="true">Sí</option>
      </select>

      <label>Borrador</label>
      <select id="borrador">
        <option value="BORRADORCREADONO">No Creado</option>
        <option value="BORRADORCREADOSI">Creado</option>
      </select>

      <label>Presentada</label>
      <select id="presentada">
        <option value="CONFIRMADOPRESENTARNO">No Presentada</option>
        <option value="CONFIRMADOPRESENTARSI">Presentada</option>
      </select>

      <label>Cobrado</label>
      <select id="cobrado">
        <option value="NO">No</option>
        <option value="SI">Sí</option>
      </select>

      <label>Tipo Cliente</label>
      <select id="tipoCliente">
        <option value="">Selecciona una opción</option>
        <option value="AUTONOMO">Autónomo</option>
        <option value="PARTICULARES">Particulares</option>
        <option value="NORESIDENTE">No Residente</option>
      </select>

      <label>Estado Cliente</label>
      <select id="estadoCliente">
        <option value="CONTACTADONO">No Contactado</option>
        <option value="CONTACTADOSI">Contactado</option>
      </select>

      <label>Casilla 505 Actual</label>
      <input id="casilla505Actual" type="text">

      <button type="submit" class="cliente-guardar">
        <i class="fa-solid fa-floppy-disk"></i>
        Guardar Cliente
      </button>
    </form>
  </section>
</main>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="../js/Script.js"></script>
</body>
</html>
